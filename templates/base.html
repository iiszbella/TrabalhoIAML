<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NightWare{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-chat: rgba(10, 10, 10, 0.95);
            --border-color: rgba(180, 0, 0, 0.25);
            --border-glow: rgba(180, 0, 0, 0.15);
            --accent: #b40000;
            --accent-light: #dc143c;
            --accent-gradient: linear-gradient(135deg, #b40000 0%, #8b0000 100%);
            --text-primary: #e8e8e8;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-muted: rgba(255, 255, 255, 0.3);
            --bubble-user: linear-gradient(135deg, #8b0000 0%, #5c0000 100%);
            --bubble-bot-bg: rgba(180, 0, 0, 0.08);
            --bubble-bot-border: rgba(180, 0, 0, 0.2);
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: rgba(180, 0, 0, 0.2);
            --input-focus-border: rgba(180, 0, 0, 0.5);
            --input-focus-glow: rgba(180, 0, 0, 0.15);
            --scrollbar-track: transparent;
            --scrollbar-thumb: rgba(180, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #f5f0f0;
            --bg-secondary: #ede5e5;
            --bg-chat: rgba(255, 255, 255, 0.95);
            --border-color: rgba(180, 0, 0, 0.15);
            --border-glow: rgba(180, 0, 0, 0.08);
            --accent: #8b0000;
            --accent-light: #b40000;
            --text-primary: #1a1a1a;
            --text-secondary: rgba(0, 0, 0, 0.5);
            --text-muted: rgba(0, 0, 0, 0.35);
            --bubble-user: linear-gradient(135deg, #8b0000 0%, #6b0000 100%);
            --bubble-bot-bg: rgba(180, 0, 0, 0.05);
            --bubble-bot-border: rgba(180, 0, 0, 0.15);
            --input-bg: rgba(0, 0, 0, 0.03);
            --input-border: rgba(180, 0, 0, 0.2);
            --input-focus-border: rgba(180, 0, 0, 0.4);
            --input-focus-glow: rgba(180, 0, 0, 0.1);
            --scrollbar-track: transparent;
            --scrollbar-thumb: rgba(180, 0, 0, 0.2);
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }
        
        /* Chat Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 720px;
            margin: 0 auto;
            background: var(--bg-chat);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 40px var(--border-glow);
            transition: all 0.4s ease;
        }
        
        /* Chat Messages */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        #chat::-webkit-scrollbar {
            width: 4px;
        }
        
        #chat::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        
        #chat::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }
        
        .message {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.bot {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.01em;
        }
        
        .message.user .message-bubble {
            background: var(--bubble-user);
            color: #f0f0f0;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-bubble {
            background: var(--bubble-bot-bg);
            color: var(--text-primary);
            border: 1px solid var(--bubble-bot-border);
            border-bottom-left-radius: 4px;
        }
        
        .message-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            margin-left: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .message.user .message-label {
            text-align: right;
            margin-right: 4px;
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 14px;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-6px);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Input Container */
        .input-container {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #mensagem {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 11px 16px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            flex: 1;
            font-family: 'Inter', sans-serif;
        }
        
        #mensagem:focus {
            background: var(--input-bg);
            border-color: var(--input-focus-border);
            box-shadow: 0 0 20px var(--input-focus-glow);
            outline: none;
        }
        
        #mensagem::placeholder {
            color: var(--text-muted);
        }
        
        .btn-send {
            background: var(--accent-gradient);
            color: #f0f0f0;
            border: none;
            border-radius: 12px;
            padding: 11px 24px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
        }
        
        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(180, 0, 0, 0.4);
        }
        
        .btn-send:active {
            transform: translateY(0);
        }
        
        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Header */
        header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0;
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Theme Toggle */
        .btn-theme-toggle {
            position: absolute;
            right: 0;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            line-height: 1;
        }

        .btn-theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--border-glow);
        }
        
        /* Footer */
        footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }
        
        /* Main Container */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            .message-bubble {
                max-width: 85%;
                font-size: 0.85rem;
            }
            
            .header-title {
                font-size: 1.2rem;
            }
            
            .input-container {
                padding: 12px 16px;
            }
            
            .btn-send {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
            
            #mensagem {
                padding: 10px 14px;
            }

            .main-wrapper {
                padding: 8px;
            }
        }
        
        /* Acessibilidade */
        .btn-send:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        
        #mensagem:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-theme-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <header>
            {% include 'header.html' %}
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            {% include 'footer.html' %}
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                html.setAttribute('data-bs-theme', 'light');
                icon.textContent = '🌙';
                localStorage.setItem('nightware-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                html.setAttribute('data-bs-theme', 'dark');
                icon.textContent = '☀️';
                localStorage.setItem('nightware-theme', 'dark');
            }
        }

        // Restaurar tema salvo
        (function() {
            const saved = localStorage.getItem('nightware-theme');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.setAttribute('data-bs-theme', 'light');
                const icon = document.getElementById('themeIcon');
                if (icon) icon.textContent = '🌙';
            }
        })();
    </script>
</body>
</html>
