{% extends 'base.html' %}

{% block title %}Chat - Chatbot de Terror{% endblock %}

{% block content %}

<div class="chat-container" style="width: 100%; max-height: calc(100vh - 240px);">
    <div id="chat" role="log" aria-live="polite" aria-label="Histórico de conversa"></div>
    
    <div class="input-container">
        <input 
            type="text" 
            id="mensagem" 
            class="flex-grow-1"
            placeholder="Pergunte sobre jogos de terror..." 
            onkeypress="if(event.key==='Enter' && !event.shiftKey) enviar()"
            aria-label="Campo de entrada de mensagem"
            autocomplete="off"
        >
        <button 
            class="btn-send" 
            onclick="enviar()"
            id="btnEnviar"
            aria-label="Enviar mensagem"
        >
            Enviar
        </button>
    </div>
</div>

<script>
    let enviando = false;
    
    function criarMensagem(texto, tipo) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${tipo}`;
        
        const labelDiv = document.createElement('div');
        labelDiv.className = 'message-label';
        labelDiv.textContent = tipo === 'user' ? 'Você' : '👻 Davy Jones';
        
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'message-bubble';
        bubbleDiv.innerHTML = texto.replace(/\n/g, '<br>');
        bubbleDiv.setAttribute('role', 'article');
        
        messageDiv.appendChild(labelDiv);
        messageDiv.appendChild(bubbleDiv);
        
        return messageDiv;
    }
    
    function mostrarDigitando() {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message bot';
        messageDiv.id = 'typing-indicator';
        
        const labelDiv = document.createElement('div');
        labelDiv.className = 'message-label';
        labelDiv.textContent = '👻 Davy Jones';
        
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        
        messageDiv.appendChild(labelDiv);
        messageDiv.appendChild(typingDiv);
        
        return messageDiv;
    }
    
    function enviar() {
    if (enviando) return;

    let input = document.getElementById("mensagem");
    let msg = input.value.trim();

    if (!msg) return;

    enviando = true;

    let chat = document.getElementById("chat");

    chat.appendChild(criarMensagem(msg, 'user'));
    chat.scrollTop = chat.scrollHeight;

    input.value = "";
    input.focus();

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({mensagem: msg})
    })
    .then(res => res.json())
    .then(data => {
        chat.appendChild(criarMensagem(data.resposta, 'bot'));
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(() => {
        chat.appendChild(criarMensagem('Erro ao enviar mensagem', 'bot'));
    })
    .finally(() => {
        enviando = false;
    });
}
    
    // Carregar saudação inicial e focar no input
    document.addEventListener('DOMContentLoaded', () => {
        // Carregar saudação
        fetch("/saudacao")
            .then(res => res.json())
            .then(data => {
                let chat = document.getElementById("chat");
                chat.appendChild(criarMensagem(data.mensagem, 'bot'));
                chat.scrollTop = chat.scrollHeight;
            })
            .catch(err => console.error("Erro ao carregar saudação:", err));
        
        document.getElementById("mensagem").focus();
    });
</script>

{% endblock %}
